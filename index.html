<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks ·</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Font Inter Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Flatpickr (Date Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a12] text-white font-[Inter]">
    
    <!-- NAVBAR PREMIUM -->
    <nav class="fixed top-0 w-full backdrop-blur-xl bg-[#0a0a12]/80 border-b border-white/5 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-check-circle text-2xl text-purple-400"></i>
                <span class="font-light tracking-tight">Task<span class="text-purple-400 font-normal">Flow</span></span>
            </div>
            <a href="../../main.html" class="text-gray-400 hover:text-white transition flex items-center gap-2 text-sm">
                <i class="fas fa-arrow-left text-xs"></i>
                Back to Portfolio
            </a>
        </div>
    </nav>
    
    <!-- MAIN CONTENT -->
    <main class="pt-24 pb-16 px-4 max-w-4xl mx-auto">
        
        <!-- HEADER -->
        <div class="mb-10">
            <h1 class="text-4xl md:text-5xl font-light tracking-tight mb-3">Task<span class="text-purple-400 font-normal">Manager</span></h1>
            <p class="text-gray-500">Atur tugas dengan deadline dan prioritas</p>
        </div>
        
        <!-- ADD TASK FORM (DENGAN DEADLINE) -->
        <div class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-2xl p-6 mb-8">
            <h2 class="text-sm font-medium text-gray-400 mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle text-purple-400"></i>
                Tambah Tugas Baru
            </h2>
            
            <div class="space-y-4">
                <!-- Baris 1: Nama Tugas -->
                <input type="text" 
                       id="taskInput"
                       placeholder="Apa yang ingin kamu kerjakan?"
                       class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/40 transition">
                
                <!-- Baris 2: Priority + Deadline -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <select id="prioritySelect" 
                            class="px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-gray-400 focus:outline-none focus:border-purple-500/40 transition">
                        <option value="low" class="bg-[#0a0a12]">Low Priority</option>
                        <option value="medium" class="bg-[#0a0a12]" selected>Medium Priority</option>
                        <option value="high" class="bg-[#0a0a12]">High Priority</option>
                    </select>
                    
                    <input type="text" 
                           id="deadlineDate" 
                           placeholder="Pilih tanggal"
                           class="md:col-span-2 px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/40 transition">
                    
                    <input type="text" 
                           id="deadlineTime" 
                           placeholder="Jam"
                           class="px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/40 transition">
                </div>
                
                <!-- Baris 3: Tombol Add -->
                <div class="flex justify-end">
                    <button id="addBtn" 
                            class="px-8 py-3 bg-gradient-to-r from-purple-600 to-blue-600 rounded-xl hover:scale-105 transition duration-300 shadow-lg shadow-purple-500/25 flex items-center gap-2">
                        <i class="fas fa-plus"></i>
                        Tambah Tugas
                    </button>
                </div>
            </div>
        </div>
        
        <!-- FILTER & STATS -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
            <!-- Filter Tabs -->
            <div class="flex gap-1 p-1 bg-white/5 border border-white/10 rounded-xl">
                <button id="filterAll" class="filter-btn active px-4 py-2 text-sm rounded-lg transition">All</button>
                <button id="filterActive" class="filter-btn px-4 py-2 text-sm rounded-lg transition">Active</button>
                <button id="filterCompleted" class="filter-btn px-4 py-2 text-sm rounded-lg transition">Completed</button>
            </div>
            
            <!-- Stats -->
            <div class="flex gap-4 text-sm">
                <div><span id="totalTasks" class="text-white font-medium">0</span> <span class="text-gray-500">total</span></div>
                <div><span id="completedTasks" class="text-green-400 font-medium">0</span> <span class="text-gray-500">selesai</span></div>
            </div>
        </div>
        
        <!-- TASK LIST -->
        <div id="taskList" class="space-y-3">
            <!-- Tasks akan diisi via JS -->
        </div>
        
        <!-- EMPTY STATE -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="text-7xl mb-4 opacity-20">📋</div>
            <h3 class="text-xl text-gray-400 mb-2">Belum ada tugas</h3>
            <p class="text-gray-600">Tambahkan tugas pertama kamu dengan deadline</p>
        </div>
        
        <!-- CLEAR COMPLETED BUTTON -->
        <div class="mt-6 flex justify-end">
            <button id="clearCompletedBtn" 
                    class="text-sm text-gray-600 hover:text-red-400 transition flex items-center gap-2">
                <i class="fas fa-trash-alt text-xs"></i>
                Hapus yang sudah selesai
            </button>
        </div>
        
    </main>
    
    <!-- FOOTER -->
    <footer class="border-t border-white/5 py-6 px-4 text-center text-gray-600 text-sm">
        © 2026 · [Dafa Ardianto] · Data tersimpan di browser otomatis
    </footer>
    
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/id.js"></script>
    
    <script src="script.js"></script>
</body>

</html>
